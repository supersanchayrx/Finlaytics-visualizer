<!DOCTYPE html>
<html>

<head>
    <title>
        Stock Fetcher
    </title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="title">
        <h1>finanical modelling tool test</h1>
    </div>
    <div class="container">
        <div class="label">
            <label for="Stocks" style="margin-left: 40px;">Choose a stock:</label>
        </div>
        <div class="options">
            <select name="Stocks" id="Stocks">
                <option value="AAPL">Apple</option>
                <option value="MSFT">Microsoft</option>
                <option value="GOOG">Google</option>
                <option value="NVDA">Nvidia</option>
            </select>
        </div>


        <div class="Chart Options">
            <select name="ChartType" id="Charts">
                <option value="Candle">CandleStick</option>
                <option value="Area">Area</option>
                <option value="Line">Line</option>
            </select>
        </div>

        <button type="button" id="fetchbutton" style="margin-left: 50px;">Visualize stock Data</button>
    </div>


    <div class = "dashboard">
        <div class="chartCanvas">
            <canvas id="financialchart" width="800" height="600">
            </canvas>

            <div>
                <button type="button" id="prevBtn">Previous Day</button>
                <button type="button" id="nextBtn">Next Day</button>
            </div>
        </div>

        <div class = "KPIcards">
            <p> current Price -> $<span id ="currentPrice">---</span></p>
            <p> Daily Returns -> <span id ="DailyReturns">---</span>%</p>
            <p> Volitality    -> <span id ="Volitality">---</span></p>
        </div>
    </div>

</body>

<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.0/dist/chartjs-chart-financial.min.js"></script>

<script src="js/app.js"></script>

</html>
